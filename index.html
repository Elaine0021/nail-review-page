<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <title>店铺评价素材页</title>
    <link rel="stylesheet" href="./styles.css?v=3" />
  </head>
  <body>
    <main class="app-shell">
      <section id="reviewView" class="review-layout">
        <header class="topbar">
          <div>
            <p class="eyebrow">Review Draft</p>
            <h1>今日评价参考</h1>
          </div>
          <button id="refreshButton" class="ghost-button" type="button">换一条</button>
        </header>

        <section class="panel">
          <div class="section-heading">
            <h2>评价文案</h2>
            <button id="copyButton" class="small-button" type="button">复制</button>
          </div>
          <p id="reviewText" class="review-text"></p>
          <div id="keywordList" class="keyword-list"></div>
          <p class="notice">请根据真实体验修改后再发布，避免发布与实际体验不符的内容。</p>
        </section>

        <section class="panel">
          <div class="section-heading">
            <h2>推荐图片</h2>
            <span id="imageCount" class="muted"></span>
          </div>
          <div id="imageGrid" class="image-grid"></div>
        </section>

        <a id="reviewLink" class="primary-button link-button" href="#" target="_blank" rel="noopener">前往评价页面</a>
      </section>
    </main>

    <script src="./data.js?v=3"></script>
    <script src="./image-manifest.js?v=3"></script>
    <script src="./app.js?v=3"></script>
  </body>
</html>
